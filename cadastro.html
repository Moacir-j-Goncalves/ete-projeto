<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login - Elegance</title>
    <!-- Importando uma fonte elegante do Google Fonts -->
    <link href="https://googleapis.com" rel="nexa.css">
    
    <style>
        /* Estilização Geral */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(230deg, #4a1c1c 55%, #FEEFDC 100%);
            color: #4a1c1c;
        }

        /* Card Principal */
        .login-card {
            background-color: #fcf6f0; /* Tom off-white da imagem */
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* Logo "N" */
        .logo-n {
            font-family: 'Playfair Display', serif;
            font-size: 100px;
            font-weight: 400;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to bottom, #4a1c1c, #8e6363);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .divider-diamond {
            margin: 10px 0 30px;
            color: #d1b4b4;
            font-size: 12px;
        }

        /* Formulário */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-container i {
            position: absolute;
            left: 12px;
            color: #888;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e0d5d5;
            border-radius: 8px;
            background-color: transparent;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #4a1c1c;
        }

        /* Botão Entrar */
        .btn-entrar {
            width: 100%;
            padding: 14px;
            background-color: #4a1c1c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-entrar:hover {
            background-color: #351414;
        }

        /* Links de Rodapé */
        .footer-links {
            margin-top: 20px;
            font-size: 13px;
        }

        .footer-links a {
            color: #4a1c1c;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .footer-links a:hover {
            border-bottom: 1px solid #4a1c1c;
        }

        .secondary-divider {
            margin: 25px 0 15px;
            border: 0;
            border-top: 1px solid #e0d5d5;
            position: relative;
        }

        .secondary-divider::after {
            content: "◆";
            position: absolute;
            top: -7px;
            left: 50%;
            transform: translateX(-50%);
            background: #fcf6f0;
            padding: 0 10px;
            font-size: 10px;
            color: #d1b4b4;
        }

        .first-access {
            font-size: 12px;
            color: #7a5c5c;
        }

        /* Ícone de ver senha */
        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="logo-n">N</h1>
        <div class="divider-diamond">◆</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <div class="input-container">
                    <input type="text" id="usuario" placeholder="Digite seu usuário" required>
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <div class="input-container">
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                    <!-- Ícone simplificado de "olho" usando SVG -->
                    <span class="toggle-password" onclick="togglePass()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <div class="footer-links">
            <a href="#">Esqueceu a senha?</a>
            
            <div class="secondary-divider"></div>
            
            <p class="first-access">Primeiro acesso? <a href="#">clique aqui</a></p>
        </div>
    </div>

    <script>
        // Função para mostrar/esconder a senha
        function togglePass() {
            const senhaInput = document.getElementById('senha');
            if (senhaInput.type === 'password') {
                senhaInput.type = 'text';
            } else {
                senhaInput.type = 'password';
            }
        }

        // Simulação de envio do formulário
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('usuario').value;
            alert('Tentativa de login para: ' + user);
        });
    </script>

</body>
</html>
