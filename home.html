<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" href="icon.png.png" type="image/png">
  <title>Nexa</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

  <!-- CSS externo -->
  <link rel="stylesheet" href="home.css">
</head>

<body>

  <!-- MENU -->
  <div class="menu container">
    <button class="btn">Home</button>
    <button class="btn destaque">Login</button>
    <button class="btn destaque">Área da empresa</button>
    <button class="btn">Área do cliente</button>
    <button class="btn">Sobre nós</button>
    <button class="btn">Página do associado</button>
    <button class="btn">Central de ajuda</button>
  </div>
    <!-- Card principal do login -->
    <div class="login-card">

        <!-- Logo do site -->
        <img src="logo.png" alt="logo" class="logo-img">

        <!-- Pequeno divisor com símbolo -->
        <div class="divider-diamond">◆</div>

        <!-- Formulário de login -->
        <form id="loginForm">

            <!-- Campo de usuário -->
            <div class="form-group">
                <label for="usuario">Usuário</label> <!-- Texto acima do input -->
                
                <div class="input-container">
                    <!-- Campo de texto -->
                    <input type="text" id="usuario" placeholder="Digite seu usuário" required>
                </div>
            </div>

            <!-- Campo de senha -->
            <div class="form-group">
                <label for="senha">Senha</label>

                <div class="input-container">
                    <!-- Campo de senha (oculta os caracteres) -->
                    <input type="password" id="senha" placeholder="Digite sua senha" required>

                    <!-- Ícone de mostrar/ocultar senha -->
                    <span class="toggle-password" onclick="togglePass()">
                        
                        <!-- Ícone SVG (olho) -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>

                    </span>
                </div>
            </div>

            <!-- Botão de envio do formulário -->
            <button type="submit" class="btn-entrar">Entrar</button>
        </form>


        <!-- Área de links abaixo do login -->
        <div class="footer-links">

            <!-- Link de recuperação de senha -->
            <a href="#">Esqueci a senha</a>

            <!-- Linha divisória com detalhe -->
            <div class="secondary-divider"></div>

            <!-- Primeiro acesso -->
            <p class="first-access">
                Criar conta <a href="http://127.0.0.1:5500/home.html"></a></p>

        </div>
    </div>

    <div class="row">

      <!-- LOGO + DESCRIÇÃO -->
      <div class="col-sm-4">

        <p>Conectando você aos melhores serviços perto de você.</p>
      </div>

      <!-- LINKS -->
      <div class="col-sm-4">
        <h4>Links úteis</h4>
        <ul class="footer-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Sobre nós</a></li>
          <li><a href="#">Serviços</a></li>
          <li><a href="#">Contato</a></li>
        </ul>
      </div>

      <!-- REDES SOCIAIS -->
      <div class="col-sm-4">
        <h4>Redes sociais</h4>
        <div class="social">
          <a href="#">Facebook</a><br>
          <a href="#">Instagram</a><br>
          <a href="#">WhatsApp</a>
        </div>
      </div>

    </div>

    <!-- LINHA FINAL -->
    <div class="footer-bottom">
      <p>© 2026 Nexa - Todos os direitos reservados</p>
    </div>

  </div>
</footer>
      
        <!-- Linha divisória com detalhe -->
      <div class="secondary-divider"></div>

    </div>
  </div>

</body>
</html>
